<form class="form" [formGroup]="form" (ngSubmit)="onSubmit()">
    <app-section-title sectionTitle="Usuário selecionado" sectionText="Atualize as informações do usuário abaixo"></app-section-title>

        <app-error-msg *ngIf="error.hasError" [msg]="error.msg"></app-error-msg>
        <app-success-msg *ngIf="success && !error.hasError" msg="Usuário editado com sucesso"></app-success-msg>
    <div class="form__fields">
        <div class="form__column--left">
            <app-input [input]="inputName" [control]="name" [error]="isInvalid(name)"></app-input>
            <app-input [input]="inputLastname" [control]="lastname" [error]="isInvalid(lastname)"></app-input>
        </div>
        <div class="form__column--left">
            <app-input [input]="inputUsername" [control]="username" [error]="isInvalid(username)"></app-input>
            <app-input [input]="inputPassword" [control]="password" [error]="isInvalid(password)"></app-input>
        </div>
        <div class="form__permissition">
            <p class="form__permissition-title">Permissão</p>
            <app-select [optionsList]="roleList" [control]="role" [error]="isInvalid(role)"></app-select>
        </div>
    </div>
    <div class="form__buttons">
        <app-button text="Fechar" (click)="btnCancel()"></app-button>
        <app-button text="Salvar" variant="primary"></app-button>
    </div>
</form>
