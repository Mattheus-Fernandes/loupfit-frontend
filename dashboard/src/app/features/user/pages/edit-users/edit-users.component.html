<section class="edit-users">
    <div class="edit-users__container" [class.edit-users__container--blur]="formOpen">
       <app-section-title sectionTitle="Editar Usuários" sectionText="Selecione o usuário para editar"></app-section-title>
       <ng-container *ngIf="usersList.length > 0; else loading">
            <div class="edit-users__workspace">
                <app-search-bar (searchValue)="onSearch($event)"></app-search-bar>
                    <div class="edit-users__list">
                        <ng-container *ngFor="let user of usersListFiltered">
                            <app-card-user 
                                [user]="user" 
                                [hasButton]="true" 
                                buttonText="Editar"
                                (onClick)="selectedUser(user)"
                            ></app-card-user>
                        </ng-container>
                    </div>
                </div>
       </ng-container>
       <ng-template #loading>
            <app-spinner></app-spinner>
       </ng-template>   
    </div>
    
    <app-modal *ngIf="formOpen">
        <app-form-edit-user [formTitle]="formHeader.title" [formText]="formHeader.text" [formMode]="formMode.EDIT" [user]="user" (closeForm)="closeForm($event)"></app-form-edit-user>
    </app-modal>
</section>
